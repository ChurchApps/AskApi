nodeLinker: node-modules
enableScripts: false
enableImmutableInstalls: false   # local migration installs need to write the lockfile; CI uses --immutable

# Git dependencies must be explicitly approved. Empty = none approved (AskApi has no git deps).
# Set explicitly (not deleted) so Yarn's compat migration won't silently re-add the permissive "**".
approvedGitRepositories: []

# Supply-chain cooldown: refuse dependency versions published less than 7 days ago
# (blunts "publish-malicious-version-then-exploit-within-hours" attacks)...
npmMinimalAgeGate: 7d
# ...but trust our own first-party packages immediately (no cooldown).
npmPreapprovedPackages:
  - "@churchapps/*"
